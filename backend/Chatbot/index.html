<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graduation Assistant | AI Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0c10;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent-color: #6366f1;
            --text-color: #e2e8f0;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.2) 0, transparent 50%);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .dashboard {
            width: 90%;
            max-width: 1000px;
            height: 85vh;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        header {
            padding: 24px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; }
        .status { font-size: 13px; color: #10b981; display: flex; align-items: center; gap: 8px; }
        .status::before { content: ""; width: 8px; height: 8px; background: #10b981; border-radius: 50%; display: block; box-shadow: 0 0 8px #10b981; }

        #chat-container {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-msg {
            align-self: flex-end;
            background: var(--accent-color);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .ai-msg {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
        }

        .input-area {
            padding: 24px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 12px;
        }

        input {
            flex: 1;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            outline: none;
            transition: border 0.3s;
        }

        input:focus { border-color: var(--accent-color); }

        button {
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0 24px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        button:hover { opacity: 0.9; }

        .sources {
            font-size: 12px;
            margin-top: 8px;
            color: #94a3b8;
            font-style: italic;
        }

        /* Scrollbar */
        #chat-container::-webkit-scrollbar { width: 6px; }
        #chat-container::-webkit-scrollbar-track { background: transparent; }
        #chat-container::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>Graduation Assistant</h1>
            <div class="status">AI Engine Ready</div>
        </header>
        <div id="chat-container">
            <div class="message ai-msg">
                Hello! I'm your University Assistant. How can I help you with advising, policies, or your wellbeing today?
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Ask me about GPA rules, stress, or registration..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const container = document.getElementById('chat-container');
            const message = input.value.trim();
            if (!message) return;

            // User message
            const userDiv = document.createElement('div');
            userDiv.className = 'message user-msg';
            userDiv.innerText = message;
            container.appendChild(userDiv);
            input.value = '';
            container.scrollTop = container.scrollHeight;

            // Loading state
            const aiDiv = document.createElement('div');
            aiDiv.className = 'message ai-msg';
            aiDiv.innerText = 'Analyzing...';
            container.appendChild(aiDiv);

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                const data = await response.json();
                
                aiDiv.innerHTML = data.answer.replace(/\n/g, '<br>');
                
                if (data.sources && data.sources.length > 0) {
                    const sourceDiv = document.createElement('div');
                    sourceDiv.className = 'sources';
                    sourceDiv.innerText = 'Sources: ' + data.sources.map(s => s.title).join(', ');
                    aiDiv.appendChild(sourceDiv);
                }
            } catch (e) {
                aiDiv.innerText = 'Sorry, something went wrong. Make sure the server is running.';
            }
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
